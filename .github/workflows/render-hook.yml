# Optional: Settings → Secrets → RENDER_DEPLOY_HOOK_URL (من Render → Deploy Hook)
name: Render deploy hook

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_URL غير مضبوط — تخطي (النشر من Git مفعّل من لوحة Render)."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK"
