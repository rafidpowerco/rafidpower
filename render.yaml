# https://render.com/docs/blueprint-spec
# New Blueprint → connect repo, أو زر "Deploy to Render" في README

services:
  - type: web
    name: rafidpower
    runtime: docker
    plan: free
    numInstances: 1
    repo: https://github.com/rafidpowerco/rafidpower
    branch: main
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
