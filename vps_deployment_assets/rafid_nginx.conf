server {
    listen 80;
    server_name rafidpower.xyz www.rafidpower.xyz;

    # 1. Static React Frontend
    root /var/www/rafid-power/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. FastAPI AI Daemon REST Route
    location /agi/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Live WebSocket Route (Very Important for the Miniature Dashboard)
    location /ws/ {
        proxy_pass http://127.0.0.1:9000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400; # Keep connection alive
    }

    # Block access to environment and sensitive files
    location ~ /\.env {
        deny all;
    }
}
