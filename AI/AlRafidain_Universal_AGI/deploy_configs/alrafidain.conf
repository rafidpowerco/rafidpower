server {
    listen 80;
    listen [::]:80;
    server_name api.rafidpower.xyz www.rafidpower.xyz;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.rafidpower.xyz www.rafidpower.xyz;

    # SSL Configuration 
    # (These paths will be generated automatically by Certbot, but keep them here for reference)
    ssl_certificate /etc/letsencrypt/live/api.rafidpower.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rafidpower.xyz/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Maximum allowed size of the client request body (e.g., for file/document uploads to Delphi)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8000; # Forward requests to internal FastAPI Uvicorn server
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeout settings for long-running AI processes and agent thinking times
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}
